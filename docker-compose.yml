version: '3.8'

services:

  # =========================
  # ANSIBLE + APACHE TARGET
  # =========================
  child-node:
    build:
      context: ./docker-child-node
      dockerfile: Dockerfile
    container_name: child-node
    hostname: child-node

    ports:
      - "2222:22"   # SSH for Ansible
      - "8080:80"   # Apache web access

    networks:
      - ansible-net

    privileged: true

    volumes:
      # IMPORTANT: persistent Laravel code (fixes your /public missing issue)
      - laravel_staging:/var/www/html/staging
      - laravel_production:/var/www/html/production


# =========================
# OPTIONAL: SHARED VOLUMES
# =========================
volumes:
  laravel_staging:
  laravel_production:


# =========================
# NETWORK
# =========================
networks:
  ansible-net:
    driver: bridge