---
- name: Setup 2 Laravel websites on remote machine
  hosts: web
  become: yes
  gather_facts: yes

  vars:
    repo_url: "https://github.com/Houysang/TP5_DevOp.git"
    staging_dir: "/var/www/html/staging"
    production_dir: "/var/www/html/production"
    staging_db_name: "staging_db"
    prod_db_name: "prod_db"
    db_host: "localhost"

  tasks:

  # ============================================================
  # 1. INSTALL APACHE + PHP + TOOLS
  # ============================================================
  - name: Install packages
    apt:
      name:
        - apache2
        - git
        - curl
        - unzip
        - php8.3
        - php8.3-cli
        - php8.3-mbstring
        - php8.3-xml
        - php8.3-curl
        - php8.3-mysql
        - php8.3-zip
        - php8.3-bcmath
        - libapache2-mod-php8.3
        - nodejs
        - npm
      state: present
      update_cache: yes

  - name: Install Composer
    shell: |
      curl -sS https://getcomposer.org/installer | php
      mv composer.phar /usr/local/bin/composer
      chmod +x /usr/local/bin/composer
    args:
      creates: /usr/local/bin/composer

  - name: Enable Apache rewrite
    command: a2enmod rewrite
    args:
      creates: /etc/apache2/mods-enabled/rewrite.load

  - name: Disable default site
    command: a2dissite 000-default.conf
    ignore_errors: yes

  # ============================================================
  # 2. APACHE VIRTUAL HOSTS
  # ============================================================
  - name: Create staging vhost
    copy:
      dest: /etc/apache2/sites-available/staging.conf
      content: |
        <VirtualHost *:80>
            ServerName staging.local
            DocumentRoot {{ staging_dir }}/public

            <Directory {{ staging_dir }}/public>
                AllowOverride All
                Require all granted
            </Directory>
        </VirtualHost>

  - name: Create production vhost
    copy:
      dest: /etc/apache2/sites-available/production.conf
      content: |
        <VirtualHost *:80>
            ServerName production.local
            DocumentRoot {{ production_dir }}/public

            <Directory {{ production_dir }}/public>
                AllowOverride All
                Require all granted
            </Directory>
        </VirtualHost>

  - name: Enable sites
    shell: |
      a2ensite staging.conf
      a2ensite production.conf
    ignore_errors: yes

  # ============================================================
  # 3. CREATE DIRECTORIES FIRST
  # ============================================================
  - name: Create staging directory
    file:
      path: "{{ staging_dir }}"
      state: directory
      owner: www-data
      group: www-data
      mode: "0755"

  - name: Create production directory
    file:
      path: "{{ production_dir }}"
      state: directory
      owner: www-data
      group: www-data
      mode: "0755"

  # ============================================================
  # 4. STAGING DEPLOYMENT
  # ============================================================
  - name: Clone staging repo
    git:
      repo: "{{ repo_url }}"
      dest: "{{ staging_dir }}"
      force: yes
    become_user: www-data

  - name: Copy .env staging
    copy:
      src: "{{ staging_dir }}/.env.example"
      dest: "{{ staging_dir }}/.env"
      remote_src: yes

  - name: Install composer staging
    shell: |
      cd {{ staging_dir }}
      composer install
    become_user: www-data

  - name: Set staging DB config
    lineinfile:
      path: "{{ staging_dir }}/.env"
      regexp: "^{{ item.key }}="
      line: "{{ item.key }}={{ item.value }}"
    loop:
      - { key: "DB_HOST", value: "{{ db_host }}" }
      - { key: "DB_DATABASE", value: "{{ staging_db_name }}" }

  - name: Generate APP KEY staging
    shell: |
      cd {{ staging_dir }}
      php artisan key:generate --force
    become_user: www-data

  - name: Install npm staging
    shell: |
      cd {{ staging_dir }}
      npm install && npm run build
    become_user: www-data
    ignore_errors: yes

  # ============================================================
  # 5. PRODUCTION DEPLOYMENT
  # ============================================================
  - name: Clone production repo
    git:
      repo: "{{ repo_url }}"
      dest: "{{ production_dir }}"
      force: yes
    become_user: www-data

  - name: Copy .env production
    copy:
      src: "{{ production_dir }}/.env.example"
      dest: "{{ production_dir }}/.env"
      remote_src: yes

  - name: Install composer production
    shell: |
      cd {{ production_dir }}
      composer install --no-dev
    become_user: www-data

  - name: Set production DB config
    lineinfile:
      path: "{{ production_dir }}/.env"
      regexp: "^{{ item.key }}="
      line: "{{ item.key }}={{ item.value }}"
    loop:
      - { key: "DB_HOST", value: "{{ db_host }}" }
      - { key: "DB_DATABASE", value: "{{ prod_db_name }}" }

  - name: Generate APP KEY production
    shell: |
      cd {{ production_dir }}
      php artisan key:generate --force
    become_user: www-data

  - name: Install npm production
    shell: |
      cd {{ production_dir }}
      npm install && npm run build
    become_user: www-data
    ignore_errors: yes

  # ============================================================
  # 6. FIX PERMISSIONS (IMPORTANT)
  # ============================================================
  - name: Fix Laravel permissions staging
    file:
      path: "{{ staging_dir }}/{{ item }}"
      state: directory
      recurse: yes
      owner: www-data
      group: www-data
    loop:
      - storage
      - bootstrap/cache

  - name: Fix Laravel permissions production
    file:
      path: "{{ production_dir }}/{{ item }}"
      state: directory
      recurse: yes
      owner: www-data
      group: www-data
    loop:
      - storage
      - bootstrap/cache

  # ============================================================
  # 7. RESTART APACHE LAST (VERY IMPORTANT)
  # ============================================================
  - name: Restart Apache
    service:
      name: apache2
      state: restarted

  # ============================================================
  # 8. FINAL OUTPUT
  # ============================================================
  - name: Final output
    debug:
      msg:
        - "========================================"
        - " LARAVEL DEPLOYMENT COMPLETE "
        - "========================================"
        - "Staging URL: http://staging.local:8080"
        - "Production URL: http://production.local:8080"
        - "Apache: RUNNING"
        - "Laravel: DEPLOYED"
        - "========================================"