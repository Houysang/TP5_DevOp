---
- hosts: servers
  become: yes
  gather_facts: yes

  vars:
    repo_url: "https://github.com/laravel/laravel.git"
    staging_dir: "/var/www/html/staging"
    production_dir: "/var/www/html/production"

  tasks:

  # ============================================================
  # 1. INSTALL PACKAGES
  # ============================================================
  - name: Install Nginx + PHP + dependencies
    apt:
      name:
        - nginx
        - git
        - curl
        - unzip
        - php8.3-fpm
        - php8.3-mysql
        - php8.3-xml
        - php8.3-mbstring
        - php8.3-curl
        - php8.3-zip
        - php8.3-bcmath
        - php8.3-gd
        - php8.3-intl
        - npm
        - composer
      state: present
      update_cache: yes

  # ============================================================
  # 2. START SERVICES
  # ============================================================
  - name: Start nginx
    service:
      name: nginx
      state: started
      enabled: yes

  - name: Start php8.3-fpm
    service:
      name: php8.3-fpm
      state: started
      enabled: yes

  # ============================================================
  # 3. CREATE PROJECT FOLDERS
  # ============================================================
  - name: Create directories
    file:
      path: "{{ item }}"
      state: directory
      owner: www-data
      group: www-data
      mode: "0755"
    loop:
      - "{{ staging_dir }}"
      - "{{ production_dir }}"

  # ============================================================
  # 4. CLONE LARAVEL
  # ============================================================
  - name: Clone staging Laravel
    git:
      repo: "{{ repo_url }}"
      dest: "{{ staging_dir }}"
      force: yes
    become_user: www-data

  - name: Clone production Laravel
    git:
      repo: "{{ repo_url }}"
      dest: "{{ production_dir }}"
      force: yes
    become_user: www-data

  # ============================================================
  # 5. ENV SETUP
  # ============================================================
  - name: Copy .env staging
    copy:
      src: "{{ staging_dir }}/.env.example"
      dest: "{{ staging_dir }}/.env"
      remote_src: yes

  - name: Copy .env production
    copy:
      src: "{{ production_dir }}/.env.example"
      dest: "{{ production_dir }}/.env"
      remote_src: yes

  - name: Set staging DB to sqlite
    lineinfile:
      path: "{{ staging_dir }}/.env"
      regexp: "^DB_CONNECTION="
      line: "DB_CONNECTION=sqlite"

  - name: Set production DB
    lineinfile:
      path: "{{ production_dir }}/.env"
      regexp: "^DB_CONNECTION="
      line: "DB_CONNECTION=mysql"

  - name: Configure production DB credentials
    lineinfile:
      path: "{{ production_dir }}/.env"
      regexp: "^{{ item.key }}="
      line: "{{ item.key }}={{ item.value }}"
    loop:
      - { key: "DB_DATABASE", value: "production_db" }
      - { key: "DB_USERNAME", value: "root" }
      - { key: "DB_PASSWORD", value: "" }

  # ============================================================
  # 6. INSTALL DEPENDENCIES
  # ============================================================
  - name: Composer install staging
    command: composer install --no-dev
    args:
      chdir: "{{ staging_dir }}"
    become_user: www-data

  - name: Composer install production
    command: composer install --no-dev
    args:
      chdir: "{{ production_dir }}"
    become_user: www-data

  - name: npm install staging
    shell: cd {{ staging_dir }} && npm install
    become_user: www-data

  - name: npm install production
    shell: cd {{ production_dir }} && npm install
    become_user: www-data

  # ============================================================
  # 7. GENERATE APP KEY
  # ============================================================
  - name: Generate key staging
    command: php artisan key:generate
    args:
      chdir: "{{ staging_dir }}"
    become_user: www-data

  - name: Generate key production
    command: php artisan key:generate
    args:
      chdir: "{{ production_dir }}"
    become_user: www-data

  # ============================================================
  # 8. PERMISSIONS
  # ============================================================
  - name: Fix permissions
    file:
      path: "{{ item }}"
      state: directory
      recurse: yes
      owner: www-data
      group: www-data
    loop:
      - "{{ staging_dir }}/storage"
      - "{{ staging_dir }}/bootstrap/cache"
      - "{{ production_dir }}/storage"
      - "{{ production_dir }}/bootstrap/cache"

  # ============================================================
  # 9. NGINX CONFIG
  # ============================================================
  - name: staging nginx config
    copy:
      dest: /etc/nginx/sites-available/staging.conf
      content: |
        server {
            listen 80;
            server_name staging.local;
            root {{ staging_dir }}/public;

            index index.php index.html;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location ~ \.php$ {
                include snippets/fastcgi-php.conf;
                fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            }
        }

  - name: production nginx config
    copy:
      dest: /etc/nginx/sites-available/production.conf
      content: |
        server {
            listen 80;
            server_name production.local;
            root {{ production_dir }}/public;

            index index.php index.html;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location ~ \.php$ {
                include snippets/fastcgi-php.conf;
                fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            }
        }

  # ============================================================
  # 10. ENABLE SITES
  # ============================================================
  - name: enable sites
    file:
      src: /etc/nginx/sites-available/{{ item }}
      dest: /etc/nginx/sites-enabled/{{ item }}
      state: link
    loop:
      - staging.conf
      - production.conf

  # ============================================================
  # 11. RESTART SERVICES
  # ============================================================
  - name: restart nginx
    service:
      name: nginx
      state: restarted

  - name: restart php-fpm
    service:
      name: php8.3-fpm
      state: restarted

  # ============================================================
  # 12. FINAL MESSAGE
  # ============================================================
  - name: Done
    debug:
      msg:
        - "STAGING: http://staging.local"
        - "PRODUCTION: http://production.local"